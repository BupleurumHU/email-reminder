  name: 定时提醒邮件

  on:
    schedule:
# 每天北京时间的 08:25, 14:25, 20:25 各检查一次，降低漏跑概率
    - cron: '25 0,6,12 * * *'
    workflow_dispatch:       # 允许手动触发
  permissions:
    contents: write

  jobs:
    check-and-send:
      runs-on: ubuntu-latest
      steps:
        - name: 检出仓库
          uses: actions/checkout@v4

        # 每周保活一次（无实际内容变更）
        - name: 保活心跳
          if: ${{ github.event_name == 'schedule' }}
          run: |
            TODAY=$(date +%u)
            # 每周日写一次心跳，其余天跳过
            if [ "$TODAY" -eq 7 ]; then
              echo "heartbeat $(date)" > .heartbeat
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .heartbeat
              git diff --cached --quiet || git commit -m "heartbeat: $(date +%Y-%m-%d)"
              git push
            fi

        - name: 检查是否到达发送日期
          id: check
          run: |
            # ====== 配置区 ======
            INTERVAL_DAYS=177   # 改成你想要的天数，如 160
            # ====================

            LAST_SENT_FILE=".last_sent_date"

            # 读取上次发送日期
            if [ -f "$LAST_SENT_FILE" ]; then
              LAST_SENT=$(cat "$LAST_SENT_FILE")
            else
              LAST_SENT="1970-01-01"
            fi

            # 计算天数差
            LAST_SENT_EPOCH=$(date -d "$LAST_SENT" +%s)
            TODAY_EPOCH=$(date -d "today" +%s)
            DIFF_DAYS=$(( (TODAY_EPOCH - LAST_SENT_EPOCH) / 86400 ))

            echo "上次发送: $LAST_SENT"
            echo "间隔天数: $DIFF_DAYS / $INTERVAL_DAYS"

            if [ "$DIFF_DAYS" -ge "$INTERVAL_DAYS" ]; then
              echo "should_send=true" >> "$GITHUB_OUTPUT"
              echo "✅ 已达到${INTERVAL_DAYS}天，准备发送"
            else
              echo "should_send=false" >> "$GITHUB_OUTPUT"
              REMAINING=$(( INTERVAL_DAYS - DIFF_DAYS ))
              echo "⏳ 还差${REMAINING}天，跳过"
            fi

        - name: 发送到第一个QQ邮箱
          if: steps.check.outputs.should_send == 'true'
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.gmail.com
            server_port: 465
            username: ${{ secrets.GMAIL_USER }}
            password: ${{ secrets.GMAIL_PASS }}
            subject: "⏰ 180天定期提醒"
            to: ${{ secrets.QQ_EMAIL_1 }}
            from: ${{ secrets.GMAIL_USER }}
            body: |
              你好！

              这是一封自动提醒邮件，提醒你应该进行giffgaff保号重置了。

              距离上次提醒已经过了180天，请记得处理！

              ——来自你的自动化提醒系统

        - name: 发送到第二个QQ邮箱
          if: steps.check.outputs.should_send == 'true'
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.gmail.com
            server_port: 465
            username: ${{ secrets.GMAIL_USER }}
            password: ${{ secrets.GMAIL_PASS }}
            subject: "⏰ 180天定期提醒"
            to: ${{ secrets.QQ_EMAIL_2 }}
            from: ${{ secrets.GMAIL_USER }}
            body: |
              你好！

              这是一封自动提醒邮件，提醒你应该进行giffgaff保号重置了。

              距离上次提醒已经过了180天，请记得处理！

              ——来自你的自动化提醒系统

        - name: 更新发送日期
          if: steps.check.outputs.should_send == 'true'
          run: |
            date +%Y-%m-%d > .last_sent_date
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .last_sent_date
            git commit -m "更新发送日期: $(date +%Y-%m-%d)"
            git push
